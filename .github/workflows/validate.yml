name: Validate Terraform

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

  validate-examples:
    name: Validate Examples
    runs-on: ubuntu-latest
    strategy:
      matrix:
        example: [basic, with-instrumentation]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9"

      - name: Rewrite example source to local path
        run: sed -i 's|source.*=.*"dash0hq/dash0-integration/aws"|source = "../../"|' examples/${{ matrix.example }}/main.tf

      - name: Terraform Init
        run: terraform init -backend=false
        working-directory: examples/${{ matrix.example }}

      - name: Terraform Validate
        run: terraform validate
        working-directory: examples/${{ matrix.example }}